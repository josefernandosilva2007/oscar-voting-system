spring.application.name=oscar-voting-system

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/oscar_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


spring.data.redis.host=${HOST:localhost}
spring.data.redis.port=${PORT:6379}
spring.data.redis.password=${PASSWORD:password}

spring.cache.type=redis
spring.cache.cache-names=user_vote